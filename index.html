<!DOCTYPE html>
<html lang="run">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGA VPN | Maintenance</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Анимация жидкого стекла */
        .glass-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #000;
            overflow: hidden;
            filter: blur(60px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            animation: move 20s infinite alternate ease-in-out;
        }

        .blob:nth-child(1) { width: 450px; height: 450px; top: -10%; left: -10%; background: rgba(255, 255, 255, 0.15); }
        .blob:nth-child(2) { width: 350px; height: 350px; bottom: 10%; right: 10%; background: rgba(255, 255, 255, 0.1); animation-duration: 25s; }
        .blob:nth-child(3) { width: 300px; height: 300px; top: 40%; left: 30%; background: rgba(255, 255, 255, 0.12); animation-duration: 15s; }

        @keyframes move {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, 100px) scale(1.2); }
            66% { transform: translate(-30px, 50px) scale(0.8); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .container {
            text-align: center;
            padding: 30px;
            z-index: 1;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .logo {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 15px;
            text-transform: uppercase;
            border: 4px solid #fff;
            display: inline-block;
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
        }

        .status-bar {
            margin: 20px auto;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.9rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50px;
            width: fit-content;
        }

        .dot {
            height: 10px;
            width: 10px;
            background-color: #fff;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .message {
            margin-top: 10px;
            color: #ccc;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        /* Блок с нагрузкой и пользователями */
        .stats-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            font-size: 0.85rem;
            text-align: left;
            border-left: 3px solid #fff;
        }

        .stats-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .stats-label { color: #888; }
        .stats-value { color: #fff; font-weight: bold; }

        .warning-text {
            color: #ffcc00; /* Мягкий желтый для предупреждения */
            font-size: 0.85rem;
            margin-top: 10px;
            display: block;
        }

        .disclaimer {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #666;
            font-style: italic;
        }

        .tg-link {
            margin-top: 25px;
            display: inline-block;
            text-decoration: none;
            color: #fff;
            padding: 12px 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .tg-link:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #fff;
            transform: translateY(-3px);
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.75rem;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
